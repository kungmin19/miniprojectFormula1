{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm border-0 mt-4">
            <div class="card-header bg-warning py-3">
                <h4 class="mb-0 text-dark">แก้ไขข้อมูลนักแข่ง: {{ driver.name }}</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <label class="form-label fw-bold">ชื่อนักแข่ง</label>
                            <input type="text" name="name" class="form-control" value="{{ driver.name }}" required>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">ทีม (Team)</label>
                            <input type="text" name="team" class="form-control" value="{{ driver.team }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">หมายเลขนักแข่ง</label>
                            <input type="number" name="driver_number" class="form-control" value="{{ driver.driver_number }}">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">สัญชาติ</label>
                            <input type="text" name="nationality" class="form-control" value="{{ driver.nationality }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">คะแนนสะสมปัจจุบัน</label>
                            <input type="number" name="points" class="form-control" value="{{ driver.points }}">
                        </div>

                        <div class="col-md-12 mb-4">
                            <label class="form-label fw-bold">URL รูปภาพนักแข่ง</label>
                            <input type="text" name="image_url" class="form-control" value="{{ driver.image_url }}">
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-warning px-4 py-2 fw-bold">อัปเดตข้อมูล</button>
                        <a href="{{ url_for('driver.index') }}" class="btn btn-outline-secondary px-4 py-2">ยกเลิก</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
